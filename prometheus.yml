global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Node Exporter pour CPU / RAM / ressources système
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Docker conteneur Buddiz uptime via Node Exporter
  - job_name: 'docker-containers'
    metrics_path: /metrics
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      # Filtrer uniquement le conteneur Buddiz
      - source_labels: [__name__]
        regex: 'container_.*'
        action: keep